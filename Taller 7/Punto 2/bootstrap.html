<html>

<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

  <style>
    .mi-btn-primary {
      background-color: #5b4fcf;
      border: none;
      border-radius: 999px;
      padding: 10px 28px;
      font-weight: 500;
      color: white;
      transition: background 0.2s, transform 0.1s;
    }

    .mi-btn-primary:hover {
      background-color: #3c3489;
      color: white;
      transform: scale(1.03);
    }

    .mi-btn-outline {
      border: 2px solid #5b4fcf;
      border-radius: 999px;
      padding: 10px 28px;
      font-weight: 500;
      color: #5b4fcf;
      background: transparent;
      transition: all 0.2s;
    }

    .mi-btn-outline:hover {
      background-color: #5b4fcf;
      color: white;
    }

    .mi-card {
      border: 0.5px solid #afa9ec;
      border-radius: 16px;
      background: #eeedfe;
      color: #26215c;
      transition: box-shadow 0.2s;
    }

    .mi-card:hover {
      box-shadow: 0 4px 18px rgba(91, 79, 207, 0.15);
    }

    .mi-card .card-title {
      color: #3c3489;
      font-weight: 500;
    }

    .mi-card .card-text {
      color: #534ab7;
      font-size: 14px;
    }

    .mi-navbar {
      background-color: #3c3489 !important;
      border-bottom: 2px solid #5b4fcf;
    }

    .mi-navbar .navbar-brand {
      color: #eeedfe !important;
      font-weight: 500;
      letter-spacing: 1px;
    }

    .mi-navbar .nav-link {
      color: #afa9ec !important;
      font-size: 14px;
    }

    .mi-navbar .nav-link:hover {
      color: white !important;
    }

    .mi-navbar .nav-link.active {
      color: white !important;
      border-bottom: 2px solid #afa9ec;
    }

    .mi-badge-purple {
      background-color: #5b4fcf;
      color: white;
      border-radius: 999px;
      font-size: 12px;
      padding: 4px 12px;
    }

    .mi-badge-teal {
      background-color: #1d9e75;
      color: white;
      border-radius: 999px;
      font-size: 12px;
      padding: 4px 12px;
    }

    .mi-badge-coral {
      background-color: #d85a30;
      color: white;
      border-radius: 999px;
      font-size: 12px;
      padding: 4px 12px;
    }

    .mi-input {
      border: 1.5px solid #afa9ec;
      border-radius: 999px;
      padding: 10px 20px;
      outline: none;
      font-size: 14px;
      width: 100%;
      color: #26215c;
      background: #eeedfe;
      transition: border 0.2s;
    }

    .mi-input:focus {
      border-color: #5b4fcf;
      box-shadow: 0 0 0 3px rgba(91, 79, 207, 0.15);
    }

    .mi-input::placeholder {
      color: #afa9ec;
    }

    .mi-alert {
      border: none;
      border-left: 4px solid #5b4fcf;
      border-radius: 12px;
      background: #eeedfe;
      color: #26215c;
      font-size: 14px;
      padding: 14px 18px;
    }

    .seccion {
      margin-bottom: 2rem;
    }
  </style>


  <div style="padding: 1.5rem;">

    <!-- 1. NAVBAR -->
    <div class="seccion">
      <nav class="navbar navbar-expand-lg mi-navbar px-3 rounded-3">
        <span class="navbar-brand">App</span>
        <div class="navbar-nav ms-auto d-flex flex-row gap-3">
          <a class="nav-link active" href="#">Inicio</a>
          <a class="nav-link" href="#">Explorar</a>
          <a class="nav-link" href="#">Contacto</a>
        </div>
      </nav>
    </div>

    <div class="seccion">
      <div class="d-flex gap-3 flex-wrap">
        <button class="btn mi-btn-primary">Guardar</button>
        <button class="btn mi-btn-outline">Cancelar</button>
        <button class="btn mi-btn-primary" disabled style="opacity:0.5">Desactivado</button>
      </div>
    </div>

    <div class="seccion">
      <div class="row g-3">
        <div class="col-md-4">
          <div class="card mi-card p-3">
            <div class="card-body p-0">
              <h5 class="card-title">Titulo 1</h5>
              <p class="card-text">Parrafo 1</p>
              <button class="btn mi-btn-primary btn-sm mt-2">Ver más</button>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card mi-card p-3">
            <div class="card-body p-0">
              <h5 class="card-title">Titulo 2</h5>
              <p class="card-text">Parrafo 2</p>
              <button class="btn mi-btn-primary btn-sm mt-2">Ver más</button>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card mi-card p-3">
            <div class="card-body p-0">
              <h5 class="card-title">Titulo 3</h5>
              <p class="card-text">Parrafo 3</p>
              <button class="btn mi-btn-primary btn-sm mt-2">Ver más</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="seccion">
      <div class="row g-3">
        <div class="col-md-6">
          <div class="d-flex gap-2 flex-wrap align-items-center">
            <span class="mi-badge-purple">Nuevo</span>
            <span class="mi-badge-teal">Activo</span>
            <span class="mi-badge-coral">Pendiente</span>
          </div>
        </div>
        <div class="col-md-6">
          <input type="text" class="mi-input" placeholder="Buscar componente...">
        </div>
      </div>
    </div>

    <div class="seccion">
      <div class="mi-alert">
        <strong style="color:#3c3489;">Tip:</strong> Los componentes de Bootstrap se pueden personalizar modificando
        directamente sus clases en el CSS.
      </div>
    </div>
  </div>
</body>

</html>
