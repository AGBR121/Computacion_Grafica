<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body {
      background-color: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .carousel {
      height: 85vh;
      border-radius: 20px;
      overflow: hidden;
      border: 2px solid #5b4fcf;
      box-shadow: 0 0 30px rgba(91, 79, 207, 0.4);
    }

    .carousel-inner,
    .carousel-item {
      height: 100%;
    }

    .carousel-item img {
      height: 100%;
      object-fit: cover;
      filter: brightness(0.85);
      transition: filter 0.4s ease;
    }

    .carousel-item.active img {
      filter: brightness(1);
    }

    .carousel-item::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40%;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
      pointer-events: none;
    }

    .carousel-control-prev,
    .carousel-control-next {
      width: 50px;
      height: 50px;
      background-color: rgba(38, 24, 165, 0.7);
      border-radius: 50%;
      top: 50%;
      transform: translateY(-50%);
      opacity: 1;
      margin: 0 15px;
    }

    .carousel-control-prev:hover,
    .carousel-control-next:hover {
      background-color: #2b1caa;
    }

    .carousel-control-prev-icon,
    .carousel-control-next-icon {
      width: 20px;
      height: 20px;
    }

    .carousel-indicators {
      margin-bottom: 15px;
    }

    .carousel-indicators button {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.4);
      border: none;
      transition: background-color 0.3s, transform 0.3s;
    }

    .carousel-indicators button.active {
      background-color: #3526bd;
      transform: scale(1.4);
    }

    .carousel-caption {
      bottom: 20px;
      text-align: left;
      left: 30px;
      right: auto;
    }

    .carousel-caption h5 {
      font-size: 22px;
      font-weight: 600;
      color: white;
      margin: 0 0 4px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }

    .carousel-caption p {
      font-size: 13px;
      color: #ffffff;
      margin: 0;
    }
  </style>
</head>
<body>

<div class="row justify-content-center w-100">
  <div class="col-9">
    <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">

      <div class="carousel-indicators">
        <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="2"></button>
      </div>

      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="./images/gojo.webp" class="d-block w-100" alt="gojo">
          <div class="carousel-caption">
            <h5>Satoru Gojo</h5>
            <p>Jujutsu Kaisen · El más fuerte</p>
          </div>
        </div>
        <div class="carousel-item">
          <img src="./images/yuta.webp" class="d-block w-100" alt="yuta">
          <div class="carousel-caption">
            <h5>Yuta Okkotsu</h5>
            <p>Jujutsu Kaisen · Grado especial</p>
          </div>
        </div>
        <div class="carousel-item">
          <img src="./images/itadori.avif" class="d-block w-100" alt="itadori">
          <div class="carousel-caption">
            <h5>Yuji Itadori</h5>
            <p>Jujutsu Kaisen · Recipiente de Sukuna</p>
          </div>
        </div>
      </div>

      <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
        <span class="visually-hidden">Next</span>
      </button>

    </div>
  </div>
</div>

</body>
</html>
