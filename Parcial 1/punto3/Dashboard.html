<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />

<body class="dashboard-page">

  <div class="dashboard">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span>Control Financiero</span>
      </div>

      <nav class="sidebar-nav">
        <a href="Dashboard.html" class="nav-item active">
          <span class="nav-icon">⌂</span>
          Inicio
        </a>
        <a href="ingresos.html" class="nav-item">
          <span class="nav-icon">↑</span>
          Ingresos
        </a>
        <a href="gastos.html" class="nav-item">
          <span class="nav-icon">↓</span>
          Gastos
        </a>
        <a href="reportes.html" class="nav-item">
          <span class="nav-icon">◎</span>
          Reportes
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="login.html" class="btn-logout">← Cerrar sesión</a>
      </div>
    </aside>

    <main class="main-content">
      <header class="main-header">
        <div>
          <h2>Panel principal</h2>
          <p class="header-sub">Marzo 2025</p>
        </div>
      </header>

      <section class="cards-grid">

        <div class="card card--saldo">
          <div class="card-top"></div>
          <p class="card-label">Saldo Total</p>
          <h3 class="card-value">$8,450.000</h3>
          <span class="card-badge badge--up">+3.2% este mes</span>
        </div>

        <div class="card card--gastos">
          <div class="card-top"></div>
          <p class="card-label">Gastos del Mes</p>
          <h3 class="card-value">$2,130.000</h3>
          <span class="card-badge badge--down">+8.5% vs anterior</span>
        </div>

        <div class="card card--ingresos">
          <div class="card-top"></div>
          <p class="card-label">Ingresos del Mes</p>
          <h3 class="card-value">$3,200.000</h3>
          <span class="card-badge badge--up">+12% vs anterior</span>
        </div>

        <div class="card card--ahorro">
          <div class="card-top"></div>
          <p class="card-label">Ahorro Neto</p>
          <h3 class="card-value">$1,070.000</h3>
          <span class="card-badge badge--neutral">Meta: $1.500.000</span>
        </div>

      </section>
    </main>
  </div>

</body>
</html>
