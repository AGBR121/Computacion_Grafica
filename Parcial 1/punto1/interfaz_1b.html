<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *,
        *::before,
        *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        }

        html, body {
        height: 100%;
        }

        body {
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        }

        #main-container{
            width: 1000px;
            margin: 0 auto;
        }

        header{
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100px;
            background-color: #272727;
        }
        header div{
            background-color: white;
            height: 40px;
        }
        div .width1{
            width: 200px;
        }
        div .width2{
            width: 120px;
        }

        main{
            display: grid;
            height: 600px;
            grid-template-columns: 5fr 2fr;
        }
        #main_section{
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            padding: 30px;
        }
        #main_section article{
            background-color: #e5e5e5;
            border-radius: 5px;
        }


        aside{
            padding: 30px;
            padding-top: 0;
            background-color: #1b1b18;
        }
        .aside_heading{
            display: flex;
            align-items: center;
            height: 40%;
            gap: 20px;
        }
        .aside_heading article,
        .aside_heading > div{
            height: 100%;
        }
        .aside_heading article{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            width: 50%;
        }
        .ah_line{
            background-color: #e2736c;
            height: 20px;
        }
        #ah_line_1{
            width: 100%;
        }
        #ah_line_2{
            width: 80%;
            background-color: #804346;
        }
        #ah_line_3{
            width: 70%;
            background-color: #593430;
        }
        .ah_circle_container{
            display: flex;
            align-items: center;
            width: 50%;
        }
        #ah_circle{
            aspect-ratio: 8/9;
            width: 100%;
            max-height: 100%;
            
            background-color: #debb45;
            border-radius: 50%;
        }
        .aside_paragraph{
            width: 100%;
            height: 60%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-end;
        }
        .aside_paragraph div{
            height: 10px;
        }
        #p1{
            width: 200px;
            background-color: #e2736c;
        }
        #p2{
            width: 130px;
            background-color: #debb45;
        }
        #p3{
            width: 135px;
            background-color: #e2736c;
        }
        #p4{
            width: 190px;
            background-color: #e2736c;
        }
        #p5{
            width: 70px;
            background-color: #4cc188;
        }
        #p6{
            width: 120px;
            background-color: #e2736c;
        }
        #p7{
            width: 180px;
            background-color: #e2736c;
        }
        #p8{
            width: 20px;
            background-color: #e2736c;
        }
        #p9{
            width: 140px;
            background-color: #e2736c;
        }
        #p10{
            width: 160px;
            background-color: #e2736c;
        }
        #p11{
            width: 100px;
            background-color: #e2736c;
        }
    </style>
</head>
<body>
    <div id="main-container">
        <header>
            <div class="width1"></div>
            <div class="width2"></div>
            <div class="width1"></div>
            <div class="width2"></div>
            <div class="width2"></div>
        </header>
        <main>
            <section id="main_section">
                <article></article>
                <article></article>
                <article></article>
                <article></article>
            </section>

            <aside>
                <section class="aside_heading">
                    <article>
                        <div class="ah_line" id="ah_line_1"></div>
                        <div class="ah_line" id="ah_line_2"></div>
                        <div class="ah_line" id="ah_line_3"></div>
                    </article>
                    <div class="ah_circle_container">
                        <div id="ah_circle"></div>
                    </div>
                </section>
                <section class="aside_paragraph">
                    <div id="p1"></div>
                    <div id="p2"></div>
                    <div id="p3"></div>
                    <div id="p4"></div>
                    <div id="p5"></div>
                    <div id="p6"></div>
                    <div id="p7"></div>
                    <div id="p8"></div>
                    <div id="p9"></div>
                    <div id="p10"></div>
                    <div id="p11"></div>
                </section>
            </aside>
        </main>
    </div>
</body>
</html>
