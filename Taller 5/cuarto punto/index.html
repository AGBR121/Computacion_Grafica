<!DOCTYPE html>
<html lang="es">
<head>
</head>
<body>

  <div class="grid">

    <!-- 1. Degradado lineal -->
    <div class="card">
      <h3>createLinearGradient()</h3>
      <canvas id="c1" width="240" height="120"></canvas>
    </div>

    <!-- 2. Degradado radial -->
    <div class="card">
      <h3>createRadialGradient()</h3>
      <canvas id="c2" width="240" height="120"></canvas>
    </div>

    <!-- 3. Sombras -->
    <div class="card">
      <h3>shadowBlur / shadowColor</h3>
      <canvas id="c3" width="240" height="120"></canvas>
    </div>

    <!-- 4. Texto -->
    <div class="card">
      <h3>fillText() / strokeText()</h3>
      <canvas id="c4" width="240" height="120"></canvas>
    </div>

    <!-- 5. Transformaciones -->
    <div class="card">
      <h3>rotate() + translate()</h3>
      <canvas id="c5" width="240" height="120"></canvas>
    </div>

    <!-- 6. Curva cuadrática -->
    <div class="card">
      <h3>quadraticCurveTo()</h3>
      <canvas id="c6" width="240" height="120"></canvas>
    </div>

    <!-- 7. Curva Bézier -->
    <div class="card">
      <h3>bezierCurveTo()</h3>
      <canvas id="c7" width="240" height="120"></canvas>
    </div>

    <!-- 8. globalAlpha (transparencia) -->
    <div class="card">
      <h3>globalAlpha</h3>
      <canvas id="c8" width="240" height="120"></canvas>
    </div>

  </div>

  <script src="canvas.js"></script>
  
</body>
</html>
