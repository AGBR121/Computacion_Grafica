<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Inputs con Estilo</title>
</head>
<body style="font-family: Arial; background-color:#f2f2f2;">

<form style="width:50%; margin:auto; background:white; padding:20px; border-radius:10px;">

<input type="text" placeholder="Texto"
style="width:100%; padding:8px; margin:5px 0; border:2px solid blue; border-radius:5px;"><br>

<input type="password" placeholder="Contraseña"
style="width:100%; padding:8px; margin:5px 0; border:2px solid red; border-radius:5px;"><br>

<input type="radio" name="genero"
style="margin:10px;"> Masculino<br>

<input type="checkbox"
style="margin:10px;"> Acepto términos<br>

<input type="button" value="Botón"
style="background-color:green; color:white; padding:8px; border:none; border-radius:5px;"><br><br>

<input type="email" placeholder="Correo electrónico"
style="width:100%; padding:8px; margin:5px 0; border:2px solid purple;"><br>

<input type="file"
style="margin:10px 0;"><br>

<input type="hidden" value="valorOculto">

<input type="image" src="https://via.placeholder.com/100"
style="display:block; margin:10px 0;"><br>

<input type="number" placeholder="Número"
style="width:100%; padding:8px; border:2px solid orange;"><br><br>

<input type="range"
style="width:100%;"><br><br>

<input type="search" placeholder="Buscar..."
style="width:100%; padding:8px; border:2px solid gray; border-radius:20px;"><br><br>

<input type="tel" placeholder="Teléfono"
style="width:100%; padding:8px; border:2px solid brown;"><br><br>

<input type="submit" value="Enviar"
style="background-color:#2c3e50; color:white; padding:10px; border:none; width:100%; border-radius:5px;">

</form>

</body>
</html>
