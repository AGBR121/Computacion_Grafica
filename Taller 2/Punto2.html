<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Etiquetas HTML5</title>
</head>
<body>

<h1 style="color:red;" align="center" title="Título principal">Título H1</h1><br>
<h2 style="color:blue;" id="subtitulo1" class="titulo">Título H2</h2><br>
<h3 style="color:green;" id="subtitulo2" class="titulo">Título H3</h3><br>
<h4 style="color:purple;" title="Encabezado">Título H4</h4><br>
<h5 style="color:orange;" class="titulo5">Título H5</h5><br>
<h6 style="color:brown;" id="titulo6">Título H6</h6><br>

<img src="imagen.jpg" alt="Imagen de ejemplo" width="400" height="220"><br><br>

<video width="320" height="240" controls autoplay muted>
    <source src="video.mp4" type="video/mp4">
</video><br><br>

<table border="1" width="50%" align="center">
    <tr>
        <th>Nombre</th>
        <th>Edad</th>
    </tr>
    <tr>
        <td>Angel</td>
        <td>18</td>
    </tr>
</table><br><br>

<textarea rows="4" cols="30" placeholder="Escribe aquí..." maxlength="100"></textarea>

</body>
</html>
